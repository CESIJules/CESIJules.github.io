<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Countdown GO</title>
<style>
html,body{margin:0;width:100%;height:100%;font-family:Arial,Helvetica,sans-serif;background:#111;color:#fff}
body{display:flex;align-items:center;justify-content:center;overflow:hidden}
#controls{position:fixed;top:16px;left:16px;right:16px;z-index:2;background:rgba(0,0,0,.5);border:1px solid #333;border-radius:12px;padding:12px;backdrop-filter:blur(6px);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
label{font-size:14px;opacity:.9}
input,button{font-size:16px;border:none;border-radius:8px;padding:10px 12px}
input{background:#1f1f1f;color:#fff;border:1px solid #444}
button{background:#2d7bff;color:#fff;font-weight:700;cursor:pointer}
button.secondary{background:#444}
#status{font-size:14px;opacity:.9}
#screen{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:35vw;font-weight:900;user-select:none;text-align:center;white-space:pre-line}
.wait{font-size:min(7vw,48px)}
</style>
</head>
<body>
<div id="controls">
  <label for="duration">Durée (s)</label>
  <input id="duration" aria-label="Durée du décompte en secondes" type="number" min="1" max="30" value="3" title="Durée du décompte (secondes)">
  <button id="goBtn" aria-label="Lancer le décompte">GO</button>
  <button id="resetBtn" class="secondary" aria-label="Réinitialiser le décompte">Reset</button>
  <div id="status">Prêt</div>
</div>
<div id="screen" class="wait"></div>

<script type="module">
const goBtn = document.getElementById("goBtn");
const resetBtn = document.getElementById("resetBtn");
const durationInput = document.getElementById("duration");
const statusEl = document.getElementById("status");
const screen = document.getElementById("screen");

let activeCountdown = null;

const MIN_DURATION_SECONDS = 1;
const MAX_DURATION_SECONDS = 30;
const DEFAULT_DURATION_SECONDS = 3;
const PREPARATION_TIME_MS = 2500;
const READY_MESSAGE = "Prêt pour un décompte";
const FINISHED_MESSAGE = "Terminé. Relancez un décompte !";

const now = () => Date.now();

const setWaitingScreen = (msg = "En attente...") => {
  document.body.style.background = "#111";
  screen.className = "wait";
  screen.textContent = msg;
};

const updateStatus = (message = "Prêt") => {
  statusEl.textContent = message;
};

const resetCountdown = (message = READY_MESSAGE) => {
  activeCountdown = null;
  updateStatus("Prêt");
  setWaitingScreen(message);
};

const startCountdown = () => {
  const seconds = Math.min(
    MAX_DURATION_SECONDS,
    Math.max(MIN_DURATION_SECONDS, Number(durationInput.value) || DEFAULT_DURATION_SECONDS)
  );
  durationInput.value = String(seconds);
  activeCountdown = {
    startAt: now() + PREPARATION_TIME_MS,
    durationMs: seconds * 1000
  };
  updateStatus("Décompte en cours");
};

goBtn.onclick = startCountdown;
resetBtn.onclick = () => resetCountdown();

function render() {
  if (!activeCountdown) return;

  const t = now();
  const prep = activeCountdown.startAt - t;
  const diff = activeCountdown.startAt + activeCountdown.durationMs - t;

  if (prep > 0) {
    document.body.style.background = "#111";
    screen.className = "wait";
    screen.textContent = `Départ dans\n${Math.ceil(prep / 1000)} s`;
    return;
  }

  screen.className = "";
  if (diff > 0) {
    document.body.style.background = "#d50000";
    screen.textContent = String(Math.max(1, Math.ceil(diff / 1000)));
  } else if (diff > -1000) {
    document.body.style.background = "#00b300";
    screen.textContent = "GO";
  } else {
    resetCountdown(FINISHED_MESSAGE);
  }
}

setWaitingScreen(READY_MESSAGE);

setInterval(render, 30);
</script>
</body>
</html>
